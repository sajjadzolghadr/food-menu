{% extends 'food/base.html' %}

{% block body %}

<div class="container mt-5">
    <div class="row">

        <div class="col-md-5">
            <img src="{{ item.image }}" class="img-fluid rounded shadow" alt="{{ item.name }}">
        </div>

        <div class="col-md-7">
            <h1>{{ object.name }}</h1>
            <hr>

            <h4 class="text-muted">{{ object.description }}</h4>

            <h3 class="text-dark mt-4">
                ${{ object.price }}
            </h3>

            <a href="{% url 'food:update_item' item.id %}" class="btn btn-warning mt-3">
                 Update
            </a>

            <a href="{% url 'food:delete_item' item.id %}" class="btn btn-danger mt-3">
               Delete
            </a>

            <a href="/food/" class="btn btn-secondary mt-3">
                Back
            </a>
        </div>

    </div>
</div>

{% endblock %}
