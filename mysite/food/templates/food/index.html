{% extends 'food/base.html'%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food</title>
</head>
<body>
    {% block body %}
    {% for item in items %}
    <ul>
        <li>
            <a href="{% url 'food:detail' item.id %}">{{ item.id }} -- {{ item.name }}</a>
        </li>
    </ul>
        {% endfor %}
    {% endblock %}
</body>
</html>
