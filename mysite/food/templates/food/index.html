{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food</title>
    <link rel="stylesheet" href="{% static 'food/style.css'%}">
</head>
<body>
    {% for item in items %}
    <ul>
        <li>
            <a href="{% url 'food:detail' item.id %}">{{ item.id }} -- {{ item.name }}</a>
        </li>
    </ul>
{% endfor %}
</body>
</html>
